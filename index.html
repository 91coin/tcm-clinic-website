<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字迷宫 - 益智游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }

        .level-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .level-info span {
            font-weight: bold;
            color: #667eea;
        }

        .game-board {
            display: grid;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .cell {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #e6e6e6, #ffffff);
            border: none;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 5px 5px 10px #d1d1d1, -5px -5px 10px #ffffff;
        }

        .cell:hover {
            transform: translateY(-3px);
            box-shadow: 8px 8px 15px #d1d1d1, -8px -8px 15px #ffffff;
        }

        .cell.selected {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
            transform: scale(1.05);
        }

        .cell.correct {
            background: linear-gradient(145deg, #11998e, #38ef7d);
            color: white;
            animation: pulse 0.5s ease;
        }

        .cell.wrong {
            background: linear-gradient(145deg, #eb3349, #f45c43);
            color: white;
            animation: shake 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .message {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            min-height: 50px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .target-display {
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 20px;
            padding: 20px;
            background: linear-gradient(145deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 15px;
        }

        .target-display span {
            font-size: 2em;
            font-weight: bold;
        }

        .instructions {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .instructions h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .hidden {
            display: none;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .score-item {
            text-align: center;
            padding: 10px 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .score-item .label {
            font-size: 12px;
            color: #666;
        }

        .score-item .value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🧩 数字迷宫</h1>
        <p class="subtitle">挑战你的逻辑思维！</p>
        
        <div class="score-board">
            <div class="score-item">
                <div class="label">关卡</div>
                <div class="value" id="level">1</div>
            </div>
            <div class="score-item">
                <div class="label">得分</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="label">提示</div>
                <div class="value" id="hints">3</div>
            </div>
        </div>

        <div class="instructions" id="instructions">
            <h3>🎮 游戏规则</h3>
            <p id="rule-text">点击数字，使选中的数字之和等于目标值。每个数字只能使用一次！</p>
        </div>

        <div class="target-display">
            目标: <span id="target">?</span>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="controls">
            <button class="btn-primary" onclick="checkAnswer()">提交答案</button>
            <button class="btn-secondary" onclick="clearSelection()">清空选择</button>
            <button class="btn-secondary" onclick="useHint()">💡 提示</button>
            <button class="btn-secondary" onclick="newGame()">🔄 新游戏</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        let currentLevel = 1;
        let score = 0;
        let hints = 3;
        let selectedCells = [];
        let cells = [];
        let targetSum = 0;
        let gameMode = 'sum'; // sum, sequence, memory

        const levels = [
            { size: 3, mode: 'sum', min: 10, max: 20 },
            { size: 3, mode: 'sum', min: 15, max: 30 },
            { size: 4, mode: 'sum', min: 20, max: 40 },
            { size: 4, mode: 'sequence', min: 1, max: 10 },
            { size: 4, mode: 'memory', min: 1, max: 8 },
            { size: 5, mode: 'sum', min: 30, max: 60 },
            { size: 5, mode: 'sequence', min: 1, max: 15 },
            { size: 5, mode: 'memory', min: 1, max: 12 },
        ];

        function initGame() {
            const level = levels[Math.min(currentLevel - 1, levels.length - 1)];
            gameMode = level.mode;
            
            document.getElementById('level').textContent = currentLevel;
            document.getElementById('score').textContent = score;
            document.getElementById('hints').textContent = hints;
            
            updateInstructions();
            generateBoard(level);
        }

        function updateInstructions() {
            const ruleText = document.getElementById('rule-text');
            if (gameMode === 'sum') {
                ruleText.textContent = '点击数字，使选中的数字之和等于目标值。每个数字只能使用一次！';
            } else if (gameMode === 'sequence') {
                ruleText.textContent = '按从小到大的顺序点击所有数字，考验你的眼力和手速！';
            } else if (gameMode === 'memory') {
                ruleText.textContent = '记住数字的位置，然后按从小到大的顺序点击。数字会隐藏哦！';
            }
        }

        function generateBoard(level) {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${level.size}, 80px)`;
            
            cells = [];
            selectedCells = [];
            
            const numbers = [];
            for (let i = 0; i < level.size * level.size; i++) {
                numbers.push(Math.floor(Math.random() * (level.max - level.min + 1)) + level.min);
            }
            
            if (gameMode === 'sum') {
                // 确保有解
                const shuffled = [...numbers].sort(() => Math.random() - 0.5);
                const solutionSize = Math.floor(Math.random() * 3) + 2;
                targetSum = shuffled.slice(0, solutionSize).reduce((a, b) => a + b, 0);
            } else if (gameMode === 'sequence') {
                targetSum = '按顺序点击 1-' + (level.size * level.size);
                numbers.sort(() => Math.random() - 0.5);
                for (let i = 0; i < numbers.length; i++) {
                    numbers[i] = i + 1;
                }
            } else if (gameMode === 'memory') {
                targetSum = '记住位置，从小到大';
                numbers.sort(() => Math.random() - 0.5);
                for (let i = 0; i < numbers.length; i++) {
                    numbers[i] = i + 1;
                }
            }
            
            document.getElementById('target').textContent = targetSum;
            
            numbers.forEach((num, index) => {
                const cell = document.createElement('button');
                cell.className = 'cell';
                cell.textContent = num;
                cell.dataset.value = num;
                cell.dataset.index = index;
                cell.onclick = () => selectCell(cell);
                board.appendChild(cell);
                cells.push(cell);
            });
            
            if (gameMode === 'memory') {
                setTimeout(() => {
                    cells.forEach(cell => {
                        cell.textContent = '?';
                    });
                }, 3000);
            }
            
            showMessage('游戏开始！加油！', 'info');
        }

        function selectCell(cell) {
            if (cell.classList.contains('correct')) return;
            
            if (gameMode === 'sum') {
                if (cell.classList.contains('selected')) {
                    cell.classList.remove('selected');
                    selectedCells = selectedCells.filter(c => c !== cell);
                } else {
                    cell.classList.add('selected');
                    selectedCells.push(cell);
                }
            } else if (gameMode === 'sequence' || gameMode === 'memory') {
                const expectedValue = selectedCells.length + 1;
                const actualValue = parseInt(cell.dataset.value);
                
                if (actualValue === expectedValue) {
                    cell.classList.add('correct');
                    cell.textContent = actualValue;
                    selectedCells.push(cell);
                    
                    if (selectedCells.length === cells.length) {
                        levelComplete();
                    }
                } else {
                    cell.classList.add('wrong');
                    setTimeout(() => cell.classList.remove('wrong'), 500);
                    showMessage('顺序错了！再试一次', 'error');
                }
            }
        }

        function checkAnswer() {
            if (gameMode !== 'sum') return;
            
            const sum = selectedCells.reduce((acc, cell) => acc + parseInt(cell.dataset.value), 0);
            
            if (sum === targetSum) {
                selectedCells.forEach(cell => cell.classList.add('correct'));
                selectedCells.forEach(cell => cell.classList.remove('selected'));
                score += selectedCells.length * 10 + 50;
                levelComplete();
            } else {
                showMessage(`和为 ${sum}，不等于目标 ${targetSum}，再试一次！`, 'error');
                selectedCells.forEach(cell => {
                    cell.classList.add('wrong');
                    setTimeout(() => {
                        cell.classList.remove('wrong');
                        cell.classList.remove('selected');
                    }, 500);
                });
                selectedCells = [];
            }
        }

        function levelComplete() {
            showMessage(`🎉 恭喜通关第 ${currentLevel} 关！`, 'success');
            score += 100;
            currentLevel++;
            
            setTimeout(() => {
                initGame();
            }, 2000);
        }

        function clearSelection() {
            selectedCells.forEach(cell => cell.classList.remove('selected'));
            selectedCells = [];
        }

        function useHint() {
            if (hints <= 0) {
                showMessage('提示用完了！', 'error');
                return;
            }
            
            hints--;
            document.getElementById('hints').textContent = hints;
            
            if (gameMode === 'sum') {
                // 高亮一个正确答案
                const correctCells = findSolution();
                if (correctCells.length > 0) {
                    const randomCell = correctCells[Math.floor(Math.random() * correctCells.length)];
                    randomCell.style.border = '3px solid #667eea';
                    setTimeout(() => {
                        randomCell.style.border = '';
                    }, 2000);
                }
            } else {
                showMessage('这一关需要你自己思考哦！', 'info');
            }
        }

        function findSolution() {
            // 简化的解决方案查找
            for (let i = 0; i < cells.length; i++) {
                for (let j = i + 1; j < cells.length; j++) {
                    const sum = parseInt(cells[i].dataset.value) + parseInt(cells[j].dataset.value);
                    if (sum === targetSum) {
                        return [cells[i], cells[j]];
                    }
                }
            }
            return [];
        }

        function newGame() {
            currentLevel = 1;
            score = 0;
            hints = 3;
            initGame();
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }

        // 启动游戏
        initGame();
    </script>
</body>
</html>
