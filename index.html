<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐥 Duck馨的益智小游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
font-family: 'Microsoft YaHei', sans-serif;
}
h1 { color: #fff; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); font-size: 24px; }
#gameCanvas { border: 4px solid #fff; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); background: #e8f5e9; }
.score { color: #fff; font-size: 20px; margin-top: 10px; }
.controls { color: #fff; margin-top: 15px; font-size: 14px; }
.btn { background: #fff; color: #667eea; border: none; padding: 10px 30px; border-radius: 25px; font-size: 16px; cursor: pointer; margin-top: 10px; }
</style>
</head>
<body>
<h1>🐥 Duck馨的益智小游戏</h1>
<canvas id="gameCanvas" width="400" height="400"></canvas>
<div class="score">得分: <span id="score">0</span></div>
<button class="btn" onclick="startGame()">开始游戏</button>
<div class="controls">使用方向键 ↑↓←→ 控制小鸭子</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const gridSize = 20;
const tileCount = canvas.width / gridSize;
let snake = [{x: 10, y: 10}];
let food = {x: 15, y: 15};
let dx = 0, dy = 0, score = 0, gameLoop, gameRunning = false;
let particles = [];
function createParticle(x, y) {
for (let i = 0; i < 6; i++) particles.push({x: x*gridSize+gridSize/2, y: y*gridSize+gridSize/2, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 30, color: `hsl(${Math.random()*60+30},100%,70%)`});
}
function updateParticles() { particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.life--; return p.life>0; }); }
function drawParticles() { particles.forEach(p => { ctx.fillStyle=p.color; ctx.globalAlpha=p.life/30; ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fill(); }); ctx.globalAlpha=1; }
function drawDuck(x,y,isHead) { const px=x*gridSize, py=y*gridSize; ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(px+gridSize/2,py+gridSize/2,gridSize/2-2,0,Math.PI*2); ctx.fill(); if(isHead){ ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(px+gridSize/2+3,py+gridSize/2-3,3,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#FF8C00'; ctx.beginPath(); ctx.ellipse(px+gridSize/2+8,py+gridSize/2+2,6,4,0,0,Math.PI*2); ctx.fill(); } else { ctx.fillStyle='#FFA500'; ctx.beginPath(); ctx.arc(px+gridSize/2,py+gridSize/2,4,0,Math.PI*2); ctx.fill(); } }
function drawFlower(x,y) { const px=x*gridSize+gridSize/2, py=y*gridSize+gridSize/2; ctx.fillStyle='#FF69B4'; for(let i=0;i<5;i++){ const angle=(i*Math.PI*2)/5; ctx.beginPath(); ctx.ellipse(px+Math.cos(angle)*6,py+Math.sin(angle)*6,4,4,0,0,Math.PI*2); ctx.fill(); } ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2); ctx.fill(); }
function draw() { ctx.fillStyle='#e8f5e9'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.strokeStyle='#c8e6c9'; for(let i=0;i<=tileCount;i++){ ctx.beginPath(); ctx.moveTo(i*gridSize,0); ctx.lineTo(i*gridSize,canvas.height); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i*gridSize); ctx.lineTo(canvas.width,i*gridSize); ctx.stroke(); } snake.forEach((s,i)=>drawDuck(s.x,s.y,i===0)); drawFlower(food.x,food.y); updateParticles(); drawParticles(); }
function update() { if(!gameRunning)return; const head={x:snake[0].x+dx,y:snake[0].y+dy}; if(head.x<0||head.x>=tileCount||head.y<0||head.y>=tileCount){gameOver();return;} if(snake.some(s=>s.x===head.x&&s.y===head.y)){gameOver();return;} snake.unshift(head); if(head.x===food.x&&head.y===food.y){score+=10;document.getElementById('score').textContent=score;createParticle(food.x,food.y);placeFood();}else snake.pop(); }
function placeFood() { do{food={x:Math.floor(Math.random()*tileCount),y:Math.floor(Math.random()*tileCount)};}while(snake.some(s=>s.x===food.x&&s.y===food.y)); }
function gameOver() { gameRunning=false; clearInterval(gameLoop); ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#fff'; ctx.font='bold 30px Microsoft YaHei'; ctx.textAlign='center'; ctx.fillText('游戏结束!',canvas.width/2,canvas.height/2-20); ctx.font='20px Microsoft YaHei'; ctx.fillText(`得分: ${score}`,canvas.width/2,canvas.height/2+20); }
function startGame() { snake=[{x:10,y:10}]; dx=1; dy=0; score=0; document.getElementById('score').textContent=score; particles=[]; placeFood(); gameRunning=true; if(gameLoop)clearInterval(gameLoop); gameLoop=setInterval(()=>{update();draw();},150); }
document.addEventListener('keydown',e=>{ if(!gameRunning)return; switch(e.key){ case'ArrowUp':case'w':case'W':if(dy===0){dx=0;dy=-1;}break; case'ArrowDown':case's':case'S':if(dy===0){dx=0;dy=1;}break; case'ArrowLeft':case'a':case'A':if(dx===0){dx=-1;dy=0;}break; case'ArrowRight':case'd':case'D':if(dx===0){dx=1;dy=0;}break; } });
let touchStartX=0,touchStartY=0; canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;}); canvas.addEventListener('touchend',e=>{ if(!gameRunning)return; const touchEndX=e.changedTouches[0].clientX,touchEndY=e.changedTouches[0].clientY; const dtx=touchEndX-touchStartX,dty=touchEndY-touchStartY; if(Math.abs(dtx)>Math.abs(dty)){if(dtx>0&&dx!==-1){dx=1;dy=0;}else if(dtx<0&&dx!==1){dx=-1;dy=0;}}else{if(dty>0&&dy!==-1){dx=0;dy=1;}else if(dty<0&&dy!==1){dx=0;dy=-1;}} });
draw();
</script>
</body>
</html>
